seed: 42
dataset:
  source_manifest: manifests/input_raw_manifest.jsonl
  strips_per_image: 50
  strip_height: 1024
  outer_width: 128
  inner_width: 128
  seam_jitter_px: 6
  boundary_band_px: 24
model:
  architecture: seam_harmonizer_v1
  channels: [32, 64, 128, 192]
  blocks: [2, 2, 4, 6]
  num_knots: 16
  alpha: 0.20
loss:
  seam_tau: 12.0
  low_sigma: 5.0
  weights:
    rec: 1.0
    seam: 2.0
    low: 0.75
    grad: 0.25
    curve_smooth: 0.02
    curve_id: 0.01
    tv: 0.02
    mean: 0.01
train:
  seed: 42
  lr: 2.0e-4
  weight_decay: 1.0e-4
  betas: [0.9, 0.99]
  precision: bf16
  batch_size: 128
  val_batch_size: 256
  num_epochs: 20
  num_workers: 4
scheduler:
  warmup_steps: 200
  min_lr_scale: 0.005
ema:
  decay: 0.999
logging:
  tensorboard: true
  log_dir: outputs/logs/tensorboard_harmonizer
  log_interval: 20
  console_log_interval: 25
