seed: 43
dataset:
  source_manifest: manifests/input_raw_manifest.jsonl
  real_manifest: manifests/real_paired_strips_manifest.jsonl
  real_batch_ratio: 0.8
  structural_threshold: 0.6
  strips_per_image: 5
  strip_height: 1024
  outer_width: 128
  inner_width: 128
  seam_jitter_px: 0
  boundary_band_px: 24
model:
  architecture: seam_harmonizer_v3
  in_channels: 9
  channels: [32, 64, 128, 192]
  blocks: [2, 2, 4, 6]
loss:
  low_sigma: 5.0
  weights:
    rec: 1.0
    seam: 1.25
    low: 1.0
    grad: 0.4
    chroma: 0.35
    stats: 0.2
    gate: 0.02
    field: 0.05
    detail: 0.05
    matrix: 0.05
train:
  seed: 43
  lr: 1.0e-4
  weight_decay: 1.0e-4
  betas: [0.9, 0.99]
  precision: bf16
  batch_size: 64
  val_batch_size: 64
  num_epochs: 8
  num_workers: 4
scheduler:
  warmup_steps: 500
  min_lr_scale: 0.01
ema:
  decay: 0.999
logging:
  tensorboard: true
  log_dir: outputs/logs/tensorboard_harmonizer_finetune
  log_interval: 20
  console_log_interval: 25
