seed: 43
dataset:
  source_manifest: manifests/input_raw_manifest.jsonl
  strips_per_image: 60
  strip_height: 1024
  outer_width: 128
  inner_width: 128
  seam_jitter_px: 6
  boundary_band_px: 24
model:
  architecture: seam_harmonizer_v3
  in_channels: 9
  channels: [32, 64, 128, 192]
  blocks: [2, 2, 4, 6]
loss:
  low_sigma: 5.0
  weights:
    rec: 0.8
    seam: 1.5
    low: 1.2
    grad: 0.25
    chroma: 0.7
    stats: 0.35
    lab: 0.8
    gate: 0.03
    field: 0.1
    detail: 0.08
    matrix: 0.1
train:
  seed: 43
  lr: 7.0e-5
  weight_decay: 1.0e-4
  betas: [0.9, 0.99]
  precision: bf16
  batch_size: 48
  val_batch_size: 64
  num_epochs: 20
  num_workers: 4
  compile: false
scheduler:
  warmup_steps: 100
  min_lr_scale: 0.15
ema:
  decay: 0.999
logging:
  tensorboard: true
  log_dir: outputs/logs/tensorboard_harmonizer_stage2
  log_interval: 20
  console_log_interval: 25
